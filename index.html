<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Defender Ultra - BGM Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            touch-action: none;
            font-family: 'Rajdhani', sans-serif;
            color: white;
        }
        canvas { display: block; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .safe-text-container {
            display: inline-block;
            padding: 5px 15px;
            overflow: visible;
        }

        .safe-italic {
            font-family: 'Orbitron', sans-serif;
            font-style: italic;
            display: inline-block;
            overflow: visible !important;
            line-height: 1.2;
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8), 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- HUD -->
    <div class="fixed top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="glass-panel px-4 py-2 rounded-2xl pointer-events-auto border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase tracking-tighter text-blue-400 font-bold block mb-1">Tactical Score</span>
                <div class="safe-text-container">
                    <span id="scoreEl" class="text-xl safe-italic font-black text-white">0</span>
                </div>
            </div>
            <div class="glass-panel px-3 py-1 rounded-full flex items-center gap-2 pointer-events-auto w-fit">
                <span class="text-yellow-400 text-xs">🪙</span>
                <span id="goldDisplay" class="font-bold text-sm">0</span>
            </div>
        </div>

        <div class="flex gap-2 pointer-events-auto">
            <button id="muteBtn" class="glass-panel w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-all text-sm border border-white/10">
                🔊
            </button>
            <button id="openShopBtn" class="glass-panel px-5 h-10 flex items-center gap-2 rounded-full font-bold hover:bg-blue-600/30 transition-all text-xs border border-white/10 active:scale-95">
                <span>🛒</span> <span class="safe-italic uppercase">Hangar</span>
            </button>
        </div>
    </div>

    <!-- Shop/Hangar Modal -->
    <div id="shopModal" class="fixed inset-0 flex items-center justify-center bg-black/90 hidden z-30 p-4 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-md rounded-[40px] p-8 border-blue-500/30 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div class="safe-text-container">
                    <h2 class="text-2xl font-black safe-italic text-blue-400 uppercase">Hangar Ops</h2>
                    <p class="text-gray-400 text-[10px] tracking-widest">Upgrade your starship</p>
                </div>
                <button id="closeShopBtn" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full hover:bg-red-500/20 transition-all">&times;</button>
            </div>
            
            <div class="space-y-4 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-400 font-bold">I</div>
                        <div>
                            <p class="font-bold text-sm safe-italic">Rapid Fire</p>
                            <p class="text-[9px] text-gray-500">Increase fire rate by 10%</p>
                        </div>
                    </div>
                    <button class="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-[10px] font-black border border-blue-600/40">500 🪙</button>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                <span class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Current Balance</span>
                <span class="text-xl font-black text-yellow-400 safe-italic">🪙 <span id="shopGoldDisplay">0</span></span>
            </div>
        </div>
    </div>

    <!-- Main Launcher -->
    <div id="modalEl" class="fixed inset-0 flex items-center justify-center bg-black/80 z-20 backdrop-blur-md">
        <div class="glass-panel p-10 rounded-[50px] text-center max-w-sm w-full mx-4 border-blue-500/30">
            <div class="mb-8 safe-text-container">
                <h1 class="text-3xl font-black safe-italic text-white">NEON <span class="text-blue-500">DEFENDER</span></h1>
                <p class="text-blue-400/50 text-[10px] tracking-[0.3em] uppercase mt-2">8-BIT AUDIO ENGINE</p>
            </div>
            
            <div id="statsBox" class="hidden mb-8 py-6 bg-white/5 rounded-[30px]">
                <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-2">Operation Result</p>
                <div class="safe-text-container">
                    <p class="text-5xl font-black safe-italic text-white neon-glow" id="finalScoreEl">0</p>
                </div>
            </div>
            
            <button id="startGameBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[25px] w-full transition-all text-xs tracking-[0.3em] shadow-xl shadow-blue-900/40 active:scale-95">
                LAUNCH MISSION
            </button>
            <p class="text-gray-500 text-[9px] mt-6 uppercase tracking-widest">WASD: MOVE • LEFT CLICK: FIRE</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const c = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreEl = document.getElementById('scoreEl');
        const goldDisplay = document.getElementById('goldDisplay');
        const shopGoldDisplay = document.getElementById('shopGoldDisplay');
        const modalEl = document.getElementById('modalEl');
        const shopModal = document.getElementById('shopModal');
        const startGameBtn = document.getElementById('startGameBtn');
        const openShopBtn = document.getElementById('openShopBtn');
        const closeShopBtn = document.getElementById('closeShopBtn');
        const muteBtn = document.getElementById('muteBtn');

        let player, projectiles, enemies, particles, stars;
        let score = 0, totalGold = 0, animationId, spawnTimeout;
        let isFiring = false;
        let mouseX = 0, mouseY = 0;
        let lastFireTime = 0;
        const FIRE_RATE = 100;

        // Audio System
        let audioCtx, masterGain, bgmNode, isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                masterGain.gain.value = isMuted ? 0 : 0.4;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Generator BGM 8-bit prosedural
        function startBGM() {
            if (bgmNode) bgmNode.stop();
            
            const tempo = 140; 
            const noteLength = 60 / tempo / 2;
            const sequence = [
                261, 261, 329, 392, 261, 329, 392, 440,
                349, 349, 440, 523, 349, 440, 523, 587,
                392, 392, 493, 587, 392, 493, 587, 659,
                261, 261, 329, 392, 261, 329, 392, 329
            ];

            let time = audioCtx.currentTime;
            
            function scheduleNotes() {
                sequence.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'square'; // Karakteristik suara 8-bit
                    osc.frequency.setValueAtTime(freq, time + (i * noteLength));
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.9, time + (i * noteLength) + noteLength);
                    
                    g.gain.setValueAtTime(0.05, time + (i * noteLength));
                    g.gain.exponentialRampToValueAtTime(0.001, time + (i * noteLength) + noteLength);
                    
                    osc.connect(g);
                    g.connect(masterGain);
                    osc.start(time + (i * noteLength));
                    osc.stop(time + (i * noteLength) + noteLength);
                    
                    if (i === sequence.length - 1) {
                        bgmNode = osc;
                        osc.onended = () => { if(!modalEl.classList.contains('hidden')) return; startBGM(); };
                    }
                });
            }
            scheduleNotes();
        }

        function playSfx(freq, type, duration, vol) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const camera = { x: 0, y: 0 };
        const keys = { w: false, a: false, s: false, d: false };

        class Player {
            constructor(x, y, radius, color) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color;
                this.velocity = { x: 0, y: 0 };
                this.friction = 0.94;
                this.accel = 0.8;
                this.rotation = 0;
            }
            draw() {
                c.save();
                c.translate(canvas.width / 2, canvas.height / 2);
                c.rotate(this.rotation + Math.PI / 2);
                c.shadowBlur = 20;
                c.shadowColor = this.color;
                
                c.beginPath();
                c.moveTo(0, -this.radius * 1.5);
                c.lineTo(-this.radius, this.radius);
                c.lineTo(0, this.radius * 0.5);
                c.lineTo(this.radius, this.radius);
                c.closePath();
                c.fillStyle = this.color;
                c.fill();
                c.restore();
            }
            update() {
                if (keys.w) this.velocity.y -= this.accel;
                if (keys.s) this.velocity.y += this.accel;
                if (keys.a) this.velocity.x -= this.accel;
                if (keys.d) this.velocity.x += this.accel;

                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                this.rotation = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
            }
            draw() {
                const sx = this.x - camera.x;
                const sy = this.y - camera.y;
                c.beginPath();
                c.arc(sx, sy, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        class Enemy {
            constructor(x, y, radius, color, speed) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.speed = speed;
            }
            draw() {
                const sx = this.x - camera.x;
                const sy = this.y - camera.y;
                c.beginPath();
                c.arc(sx, sy, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
            }
            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
                this.alpha = 1;
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.02;
                const sx = this.x - camera.x;
                const sy = this.y - camera.y;
                c.save();
                c.globalAlpha = this.alpha;
                c.beginPath();
                c.arc(sx, sy, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
                c.restore();
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width * 2 - canvas.width,
                    y: Math.random() * canvas.height * 2 - canvas.height,
                    size: Math.random() * 1.5,
                    factor: Math.random() * 0.5
                });
            }
        }

        function drawBackground() {
            stars.forEach(s => {
                let sx = (s.x - camera.x * s.factor) % canvas.width;
                let sy = (s.y - camera.y * s.factor) % canvas.height;
                if (sx < 0) sx += canvas.width;
                if (sy < 0) sy += canvas.height;
                c.beginPath();
                c.arc(sx, sy, s.size, 0, Math.PI * 2);
                c.fillStyle = `rgba(255, 255, 255, ${0.3 + s.factor})`;
                c.fill();
            });
        }

        function init() {
            player = new Player(0, 0, 15, '#38bdf8');
            projectiles = []; enemies = []; particles = [];
            score = 0; scoreEl.innerText = score;
            createStars();
            startBGM();
        }

        function spawnEnemies() {
            spawnTimeout = setTimeout(() => {
                const angle = Math.random() * Math.PI * 2;
                const x = player.x + Math.cos(angle) * 800;
                const y = player.y + Math.sin(angle) * 800;
                enemies.push(new Enemy(x, y, 12, `hsl(${Math.random() * 360}, 70%, 50%)`, 2));
                spawnEnemies();
            }, 1000);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            c.fillStyle = '#020205';
            c.fillRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

            player.update();

            if (isFiring) {
                const now = Date.now();
                if (now - lastFireTime > FIRE_RATE) {
                    const angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
                    projectiles.push(new Projectile(player.x, player.y, 3, '#fff', {
                        x: Math.cos(angle) * 15, y: Math.sin(angle) * 15
                    }));
                    playSfx(800, 'square', 0.1, 0.05);
                    lastFireTime = now;
                }
            }

            projectiles.forEach((p, i) => {
                p.update();
                if (Math.hypot(p.x - player.x, p.y - player.y) > 1000) projectiles.splice(i, 1);
            });

            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else p.update();
            });

            enemies.forEach((enemy, ei) => {
                enemy.update();
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius) {
                    cancelAnimationFrame(animationId);
                    clearTimeout(spawnTimeout);
                    modalEl.classList.remove('hidden');
                    document.getElementById('statsBox').classList.remove('hidden');
                    document.getElementById('finalScoreEl').innerText = score;
                    playSfx(100, 'sawtooth', 0.5, 0.2);
                    isFiring = false;
                }
                projectiles.forEach((proj, pi) => {
                    if (Math.hypot(proj.x - enemy.x, proj.y - enemy.y) < proj.radius + enemy.radius) {
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(enemy.x, enemy.y, 2, enemy.color, {
                                x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 6
                            }));
                        }
                        playSfx(200, 'triangle', 0.2, 0.1);
                        score += 100; totalGold += 10;
                        scoreEl.innerText = score; goldDisplay.innerText = totalGold;
                        enemies.splice(ei, 1); projectiles.splice(pi, 1);
                    }
                });
            });
        }

        // Event Listeners
        window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; });
        window.addEventListener('keyup', e => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; });
        window.addEventListener('mousedown', () => { if (modalEl.classList.contains('hidden') && shopModal.classList.contains('hidden')) isFiring = true; });
        window.addEventListener('mouseup', () => isFiring = false);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

        startGameBtn.onclick = () => { 
            initAudio();
            modalEl.classList.add('hidden'); 
            init(); 
            animate(); 
            spawnEnemies(); 
        };
        openShopBtn.onclick = () => { 
            shopModal.classList.remove('hidden'); 
            shopGoldDisplay.innerText = totalGold;
            isFiring = false;
        };
        closeShopBtn.onclick = () => shopModal.classList.add('hidden');
        
        muteBtn.onclick = () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
            if(masterGain) masterGain.gain.value = isMuted ? 0 : 0.4;
        };

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; createStars(); };
    </script>
</body>
</html>
