<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Defender - Username & Growth Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            touch-action: none;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        canvas { display: block; }
        * { user-select: none; -webkit-user-select: none; }
        input::placeholder { color: rgba(156, 163, 175, 0.5); }
    </style>
</head>
<body>

    <!-- UI Skor & Gold -->
    <div class="fixed top-4 left-6 z-10 space-y-1 pointer-events-none">
        <div class="text-xl md:text-2xl font-bold drop-shadow-lg">
            Skor: <span id="scoreEl" class="text-blue-400">0</span>
        </div>
        <div class="text-lg md:text-xl font-bold flex items-center gap-2">
            <span class="text-yellow-400">🪙</span> <span id="goldDisplay" class="text-yellow-400">0</span>
        </div>
        <div class="text-sm font-semibold text-purple-400">Level: <span id="levelEl">1</span></div>
    </div>

    <!-- Tombol Shop -->
    <button id="openShopBtn" class="fixed top-4 right-6 z-10 bg-gray-800/80 p-3 rounded-full hover:bg-gray-700 transition-all border border-white/20">
        🛒 Toko Skin
    </button>

    <!-- Modal Shop -->
    <div id="shopModal" class="fixed inset-0 flex items-center justify-center bg-black/90 hidden z-30 p-4">
        <div class="bg-gray-900 w-full max-w-md rounded-2xl p-6 border border-blue-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-blue-400">Toko Skin</h2>
                <button id="closeShopBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="space-y-4 max-h-96 overflow-y-auto pr-2">
                <div class="flex items-center justify-between p-4 bg-gray-800 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white shadow-[0_0_10px_white]"></div>
                        <div>
                            <p class="font-bold">Klasik Putih</p>
                            <p class="text-xs text-gray-400">Default</p>
                        </div>
                    </div>
                    <button class="skin-btn px-4 py-2 rounded-lg bg-green-600 text-sm font-bold" data-skin="white" data-price="0">Gunakan</button>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-800 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-cyan-400 shadow-[0_0_10px_#22d3ee]"></div>
                        <div>
                            <p class="font-bold">Neon Cyan</p>
                            <p class="text-xs text-gray-400">Harga: 🪙 500</p>
                        </div>
                    </div>
                    <button class="skin-btn px-4 py-2 rounded-lg bg-blue-600 text-sm font-bold" data-skin="#22d3ee" data-price="500">Beli</button>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-800 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-purple-500 shadow-[0_0_10px_#a855f7]"></div>
                        <div>
                            <p class="font-bold">Plasma Ungu</p>
                            <p class="text-xs text-gray-400">Harga: 🪙 1500</p>
                        </div>
                    </div>
                    <button class="skin-btn px-4 py-2 rounded-lg bg-blue-600 text-sm font-bold" data-skin="#a855f7" data-price="1500">Beli</button>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-800 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-orange-500 shadow-[0_0_10px_#f97316]"></div>
                        <div>
                            <p class="font-bold">Inferno</p>
                            <p class="text-xs text-gray-400">Harga: 🪙 3000</p>
                        </div>
                    </div>
                    <button class="skin-btn px-4 py-2 rounded-lg bg-blue-600 text-sm font-bold" data-skin="#f97316" data-price="3000">Beli</button>
                </div>
            </div>
            <p class="mt-6 text-center text-sm text-gray-400">Gold Kamu: <span class="text-yellow-400 font-bold">🪙 <span id="shopGoldDisplay">0</span></span></p>
        </div>
    </div>

    <!-- Joystick -->
    <div id="joystick-zone" class="fixed bottom-10 left-10 w-32 h-32 bg-white/10 border-2 border-white/20 rounded-full z-10 hidden touch-none">
        <div id="joystick-knob" class="absolute top-1/2 left-1/2 w-12 h-12 bg-white/40 rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
    </div>

    <!-- Modal Login & Game Over -->
    <div id="modalEl" class="fixed inset-0 flex items-center justify-center bg-black/80 z-20 backdrop-blur-md">
        <div class="bg-gray-900 border border-blue-500/30 p-8 md:p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
            <h1 id="gameTitle" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">NEON DEFENDER</h1>
            
            <!-- Input Username -->
            <div id="loginSection" class="mb-6">
                <p class="text-gray-400 mb-4 text-sm">Masukkan nama pilot kamu:</p>
                <input type="text" id="usernameInput" maxlength="12" placeholder="Nama Kamu..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center text-white focus:outline-none focus:border-blue-500 transition-all">
            </div>

            <div id="statsBox" class="hidden mb-8 space-y-2">
                <p class="text-5xl font-bold text-white" id="finalScoreEl">0</p>
                <p class="text-purple-400 font-bold" id="finalLevelEl">Level: 1</p>
            </div>
            
            <button id="startGameBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-10 rounded-2xl w-full transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                Mulai Bermain
            </button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const c = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreEl = document.getElementById('scoreEl');
        const goldDisplay = document.getElementById('goldDisplay');
        const shopGoldDisplay = document.getElementById('shopGoldDisplay');
        const levelEl = document.getElementById('levelEl');
        const modalEl = document.getElementById('modalEl');
        const startGameBtn = document.getElementById('startGameBtn');
        const usernameInput = document.getElementById('usernameInput');
        const loginSection = document.getElementById('loginSection');
        const shopModal = document.getElementById('shopModal');
        const openShopBtn = document.getElementById('openShopBtn');
        const closeShopBtn = document.getElementById('closeShopBtn');
        const finalScoreEl = document.getElementById('finalScoreEl');
        const finalLevelEl = document.getElementById('finalLevelEl');

        let player;
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let animationId;
        let score = 0;
        let totalGold = 0;
        let level = 1;
        let spawnTimeout;
        let playerColor = 'white';
        let ownedSkins = ['white'];
        let username = "Pilot";
        
        const camera = { x: 0, y: 0 };

        class Player {
            constructor(x, y, radius, color, name) {
                this.x = x;
                this.y = y;
                this.baseRadius = 15;
                this.radius = radius;
                this.color = color;
                this.name = name;
                this.velocity = { x: 0, y: 0 };
            }
            draw() {
                // Gambar Karakter
                c.beginPath();
                c.arc(canvas.width/2, canvas.height/2, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
                c.shadowColor = this.color;
                c.shadowBlur = 20;

                // Gambar Username di atas kepala
                c.shadowBlur = 0;
                c.fillStyle = 'white';
                c.font = 'bold 14px Segoe UI';
                c.textAlign = 'center';
                c.fillText(this.name, canvas.width/2, canvas.height/2 - this.radius - 10);
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                camera.x = this.x - canvas.width / 2;
                camera.y = this.y - canvas.height / 2;
                this.draw();
            }
            grow() {
                // Membesar maksimal hingga 3x lipat
                if(this.radius < 45) {
                    this.radius += 0.5;
                }
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width * 4 - canvas.width * 2;
                this.y = Math.random() * canvas.height * 4 - canvas.height * 2;
                this.size = Math.random() * 2;
                this.color = 'rgba(255, 255, 255, ' + Math.random() + ')';
            }
            draw() {
                const screenX = ((this.x - camera.x * 0.5) % canvas.width + canvas.width) % canvas.width;
                const screenY = ((this.y - camera.y * 0.5) % canvas.height + canvas.height) % canvas.height;
                c.beginPath();
                c.arc(screenX, screenY, this.size, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
            }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }
            draw() {
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                c.beginPath();
                c.arc(screenX, screenY, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
                c.shadowColor = this.color;
                c.shadowBlur = 15;
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }
            draw() {
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                c.beginPath();
                c.arc(screenX, screenY, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
            }
            draw() {
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                c.save();
                c.globalAlpha = this.alpha;
                c.beginPath();
                c.arc(screenX, screenY, this.radius, 0, Math.PI * 2);
                c.fillStyle = this.color;
                c.fill();
                c.restore();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
                this.draw();
            }
        }

        function init() {
            username = usernameInput.value.trim() || "Pilot";
            player = new Player(0, 0, 15, playerColor, username);
            projectiles = [];
            enemies = [];
            particles = [];
            stars = [];
            for(let i=0; i<150; i++) stars.push(new Star());
            
            score = 0;
            level = 1;
            scoreEl.innerHTML = score;
            levelEl.innerHTML = level;
            updateGoldUI();
        }

        function spawnEnemies() {
            spawnTimeout = setTimeout(() => {
                const radius = Math.random() * 20 + 10;
                let x, y;

                const angleSpawn = Math.random() * Math.PI * 2;
                const distance = Math.max(canvas.width, canvas.height) * 0.8;
                x = player.x + Math.cos(angleSpawn) * distance;
                y = player.y + Math.sin(angleSpawn) * distance;

                const color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                const angleMove = Math.atan2(player.y - y, player.x - x);
                const speed = (Math.random() * 2 + 1) * (1 + level * 0.1);

                enemies.push(new Enemy(x, y, radius, color, {
                    x: Math.cos(angleMove) * speed,
                    y: Math.sin(angleMove) * speed
                }));

                spawnEnemies();
            }, Math.max(400, 1500 - level * 150));
        }

        function updateGoldUI() {
            goldDisplay.innerText = totalGold;
            shopGoldDisplay.innerText = totalGold;
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            c.fillStyle = 'rgba(5, 5, 5, 0.2)';
            c.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => star.draw());
            player.update();

            particles.forEach((p, i) => {
                if(p.alpha <= 0) particles.splice(i, 1);
                else p.update();
            });

            projectiles.forEach((p, i) => {
                p.update();
                if(Math.hypot(p.x - player.x, p.y - player.y) > 1500) projectiles.splice(i, 1);
            });

            enemies.forEach((enemy, i) => {
                enemy.update();

                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if(distPlayer - enemy.radius - player.radius < 1) {
                    gameOver();
                }

                projectiles.forEach((proj, pi) => {
                    const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    if(dist - enemy.radius - proj.radius < 1) {
                        for(let k=0; k<8; k++) {
                            particles.push(new Particle(enemy.x, enemy.y, 2, enemy.color, {
                                x: (Math.random() - 0.5) * 5,
                                y: (Math.random() - 0.5) * 5
                            }));
                        }

                        if(enemy.radius > 15) {
                            enemy.radius -= 8;
                            score += 50;
                        } else {
                            const reward = Math.floor(Math.random() * 15) + 5;
                            totalGold += reward;
                            updateGoldUI();
                            score += 200;
                            enemies.splice(i, 1);
                            player.grow(); // KARAKTER MEMBESAR SETIAP KILL
                        }
                        projectiles.splice(pi, 1);
                        scoreEl.innerText = score;
                        
                        if(score > level * 2000) {
                            level++;
                            levelEl.innerText = level;
                        }
                    }
                });
            });
        }

        function gameOver() {
            cancelAnimationFrame(animationId);
            clearTimeout(spawnTimeout);
            modalEl.classList.remove('hidden');
            loginSection.classList.add('hidden'); // Sembunyikan input nama setelah login sekali
            document.getElementById('statsBox').classList.remove('hidden');
            finalScoreEl.innerText = score;
            finalLevelEl.innerText = `Level: ${level}`;
            startGameBtn.innerText = "Main Lagi";
        }

        const keys = { w:false, a:false, s:false, d:false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; updateVel(); });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; updateVel(); });

        function updateVel() {
            if(!player) return;
            player.velocity.x = 0; player.velocity.y = 0;
            const s = 4;
            if(keys.w) player.velocity.y = -s;
            if(keys.s) player.velocity.y = s;
            if(keys.a) player.velocity.x = -s;
            if(keys.d) player.velocity.x = s;
        }

        window.addEventListener('mousedown', e => {
            if(!player || !modalEl.classList.contains('hidden')) return;
            if(e.target === openShopBtn) return;
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            projectiles.push(new Projectile(player.x, player.y, 4, 'white', {
                x: Math.cos(angle) * 12,
                y: Math.sin(angle) * 12
            }));
        });

        const isTouch = 'ontouchstart' in window;
        const joystickZone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        if(isTouch) joystickZone.classList.remove('hidden');

        joystickZone.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.hypot(dx, dy), 40);
            const angle = Math.atan2(dy, dx);
            
            knob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            player.velocity.x = Math.cos(angle) * 4 * (dist/40);
            player.velocity.y = Math.sin(angle) * 4 * (dist/40);
        });

        joystickZone.addEventListener('touchend', () => {
            knob.style.transform = `translate(-50%, -50%)`;
            if(player) player.velocity = {x:0, y:0};
        });

        openShopBtn.onclick = () => shopModal.classList.remove('hidden');
        closeShopBtn.onclick = () => shopModal.classList.add('hidden');

        document.querySelectorAll('.skin-btn').forEach(btn => {
            btn.onclick = () => {
                const skin = btn.dataset.skin;
                const price = parseInt(btn.dataset.price);

                if (ownedSkins.includes(skin)) {
                    playerColor = skin;
                    if(player) player.color = skin;
                    alertSkin("Skin Digunakan!");
                } else if (totalGold >= price) {
                    totalGold -= price;
                    ownedSkins.push(skin);
                    playerColor = skin;
                    if(player) player.color = skin;
                    btn.innerText = "Gunakan";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    updateGoldUI();
                    alertSkin("Pembelian Berhasil!");
                } else {
                    alertSkin("Gold tidak cukup!");
                }
            };
        });

        function alertSkin(msg) {
            const a = document.createElement('div');
            a.className = "fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-600 px-6 py-3 rounded-xl font-bold z-50 animate-pulse pointer-events-none";
            a.innerText = msg;
            document.body.appendChild(a);
            setTimeout(() => a.remove(), 1500);
        }

        startGameBtn.onclick = () => {
            modalEl.classList.add('hidden');
            init();
            animate();
            spawnEnemies();
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
